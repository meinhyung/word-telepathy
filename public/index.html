<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>단어 텔레파시</title>
<meta name="description" content="모르는 사람과 실시간으로 매칭되어, 같은 단어를 말할 때까지 라운드를 반복하는 온라인 단어 텔레파시 게임." />
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6011993426742947"
     crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Gowun+Dodum&display=swap" rel="stylesheet" />
<style>
  /* ============ 디자인 토큰 ============ */
  :root {
    --bg: #EFEBF9;        /* 옅은 라벤더 배경 */
    --ink: #251C46;       /* 진한 보라 잉크 */
    --muted: #8B84A6;
    --me: #FF5C7A;        /* 나의 색 (핑크) */
    --them: #1FA3B8;      /* 상대의 색 (틸) */
    --sync: #6C3EE8;      /* 동기화 순간의 색 (보라) */
    --card: #FFFFFF;
    --radius: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Gowun Dodum', sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    padding: 28px 20px 40px;
    display: flex;
    flex-direction: column;
  }

  /* ============ 두 마음 구슬 (시그니처) ============ */
  .orbs { position: relative; height: 96px; margin-bottom: 8px; }
  .orb {
    position: absolute;
    top: 24px;
    width: 48px; height: 48px;
    border-radius: 50%;
    transition: left 0.9s cubic-bezier(.6,-0.2,.3,1.3), transform 0.6s, opacity 0.6s;
  }
  .orb.me   { background: var(--me);   left: 26%; animation: bob 3.2s ease-in-out infinite; }
  .orb.them { background: var(--them); left: calc(74% - 48px); animation: bob 3.2s ease-in-out 1.6s infinite; }
  @keyframes bob { 0%,100% { top: 24px; } 50% { top: 32px; } }
  @media (prefers-reduced-motion: reduce) { .orb { animation: none !important; } }

  .orbs.synced .orb { left: calc(50% - 24px); animation: none; }
  .orbs.synced .orb.them { mix-blend-mode: multiply; }
  .orbs.synced::after {
    content: '';
    position: absolute;
    top: 12px; left: calc(50% - 36px);
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid var(--sync);
    animation: burst 0.9s ease-out forwards;
  }
  @keyframes burst {
    from { transform: scale(0.4); opacity: 1; }
    to   { transform: scale(1.7); opacity: 0; }
  }

  /* ============ 공통 요소 ============ */
  h1 {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 40px;
    text-align: center;
    letter-spacing: 1px;
  }
  .tagline { text-align: center; color: var(--muted); margin-top: 6px; font-size: 15px; }

  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  button {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    border: none;
    border-radius: var(--radius);
    padding: 15px 20px;
    background: var(--ink);
    color: #fff;
    cursor: pointer;
    transition: transform 0.1s;
  }
  button:active { transform: scale(0.97); }
  button.ghost { background: transparent; color: var(--muted); font-size: 16px; }
  button.accent { background: var(--sync); }
  button:focus-visible, input:focus-visible { outline: 3px solid var(--sync); outline-offset: 2px; }
  button:disabled { background: var(--muted); cursor: default; }

  input[type="text"] {
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 18px;
    width: 100%;
    padding: 15px 18px;
    border: 2px solid #D8D2EC;
    border-radius: var(--radius);
    background: var(--card);
    color: var(--ink);
  }
  input[type="text"]:focus { border-color: var(--sync); outline: none; }

  /* ============ 홈 화면 ============ */
  #screen-home .rules {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin: 24px 0 20px;
    font-size: 15px;
    line-height: 1.8;
  }
  #screen-home .rules b.me { color: var(--me); }
  #screen-home .rules b.them { color: var(--them); }
  #screen-home .rules b.sync { color: var(--sync); }

  .home-actions { display: flex; flex-direction: column; gap: 10px; }
  .join-row { display: flex; gap: 10px; }
  .join-row input { text-transform: uppercase; letter-spacing: 3px; }
  .join-row button { white-space: nowrap; background: var(--them); }
  .home-error { color: var(--me); font-size: 14px; text-align: center; min-height: 20px; margin-top: 8px; }

  .recent {
    margin-top: 26px;
    font-size: 14px;
  }
  .recent h2 {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 17px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: normal;
  }
  .recent-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 6px;
    width: 100%;
    border: none;
    cursor: pointer;
    font-family: 'Gowun Dodum', sans-serif;
    text-align: left;
  }
  .recent-item:active { transform: scale(0.98); }
  .recent-item .word { font-family: 'Do Hyeon', sans-serif; color: var(--sync); font-size: 16px; }
  .recent-item .meta { color: var(--muted); }
  .recent-empty { color: var(--muted); }

  /* ============ 게임 기보 ============ */
  #screen-kifu { gap: 4px; }
  .kifu-title { font-family: 'Do Hyeon', sans-serif; font-size: 24px; margin: 14px 0 4px; }
  .kifu-sub { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
  .kifu-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  .kifu-row {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .kifu-row.matched { border: 2px solid var(--sync); }
  .kifu-round { font-family: 'Do Hyeon', sans-serif; font-size: 14px; color: var(--muted); width: 32px; flex-shrink: 0; }
  .kifu-words { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
  .kifu-word-tag {
    padding: 6px 12px;
    border-radius: 10px;
    font-family: 'Do Hyeon', sans-serif;
    font-size: 15px;
    color: #fff;
  }
  .kifu-word-tag.me { background: var(--me); }
  .kifu-word-tag.them { background: var(--them); }
  .kifu-row.matched .kifu-word-tag { background: var(--sync); }
  .kifu-plus { color: var(--muted); font-size: 13px; }
  .kifu-badge {
    font-size: 11px;
    background: var(--sync);
    color: #fff;
    border-radius: 8px;
    padding: 2px 8px;
    white-space: nowrap;
  }

  /* ============ 대기/방 화면 ============ */
  #screen-wait, #screen-room { align-items: center; justify-content: center; gap: 18px; text-align: center; }
  .dots span {
    display: inline-block;
    width: 10px; height: 10px;
    margin: 0 4px;
    border-radius: 50%;
    background: var(--sync);
    animation: blink 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }

  .room-code {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 60px;
    letter-spacing: 14px;
    padding-left: 14px; /* letter-spacing이 오른쪽에만 붙는 것 보정 */
    color: var(--sync);
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px 16px 34px;
    user-select: all;
  }
  .room-hint { color: var(--muted); font-size: 15px; }

  /* ============ 게임 화면 ============ */
  .game-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .round-label { font-family: 'Do Hyeon', sans-serif; font-size: 26px; }
  .head-right { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .vs-label { font-size: 14px; color: var(--muted); }
  .vs-label b.me { color: var(--me); }
  .vs-label b.them { color: var(--them); }
  .leave-btn {
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    border: 1px solid #D8D2EC;
    white-space: nowrap;
  }

  .giveup-prompt {
    display: none;
    background: var(--card);
    border: 2px solid var(--sync);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 14px;
    font-size: 14px;
    text-align: center;
  }
  .giveup-prompt.show { display: block; }
  .giveup-prompt-actions { display: flex; gap: 10px; margin-top: 10px; }
  .giveup-prompt-actions button { flex: 1; font-size: 14px; padding: 10px; }

  .timer-track {
    height: 8px;
    border-radius: 4px;
    background: #DDD6F0;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .timer-fill {
    height: 100%;
    width: 100%;
    background: var(--sync);
    border-radius: 4px;
    transition: width 0.1s linear;
  }

  .phase-msg {
    text-align: center;
    font-size: 17px;
    min-height: 26px;
    margin-bottom: 16px;
  }

  .word-form { display: flex; gap: 10px; }
  .word-form button { white-space: nowrap; }

  .reveal-area { display: none; flex-direction: column; gap: 14px; margin-top: 8px; }
  .reveal-area.show { display: flex; }
  .word-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 22px;
    font-family: 'Do Hyeon', sans-serif;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slide-in 0.5s ease-out both;
  }
  .word-card .who { font-family: 'Gowun Dodum'; font-size: 13px; color: var(--muted); }
  .word-card.mine   { border-left: 6px solid var(--me); animation-name: slide-left; }
  .word-card.theirs { border-right: 6px solid var(--them); flex-direction: row-reverse; text-align: right; animation-name: slide-right; }
  @keyframes slide-left  { from { transform: translateX(-60px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes slide-right { from { transform: translateX(60px);  opacity: 0; } to { transform: none; opacity: 1; } }

  .history {
    margin-bottom: 16px;
    max-height: 132px;
    overflow-y: auto;
  }
  .history-row {
    font-size: 14px;
    color: var(--muted);
    background: var(--card);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 6px;
  }
  .history-row b.me { color: var(--me); font-weight: normal; }
  .history-row b.them { color: var(--them); font-weight: normal; }

  /* ============ 결과 화면 ============ */
  #screen-result { align-items: center; justify-content: center; gap: 14px; text-align: center; }
  .result-word {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 52px;
    color: var(--sync);
  }
  .result-sub { color: var(--muted); font-size: 16px; }
  .vote-box { display: none; flex-direction: column; gap: 10px; margin-top: 16px; min-width: 240px; }
  .vote-box.show { display: flex; }
  .vote-status { font-size: 14px; color: var(--muted); min-height: 20px; }
  .end-box { display: none; flex-direction: column; gap: 10px; margin-top: 16px; min-width: 240px; }
  .end-box.show { display: flex; }

  /* ============ 하단 링크 ============ */
  .app-footer { text-align: center; padding-top: 18px; }
  .app-footer a { font-size: 12px; color: var(--muted); text-decoration: none; }
  .app-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="app">

  <!-- 시그니처: 두 마음을 상징하는 구슬 -->
  <div class="orbs" id="orbs">
    <div class="orb me"></div>
    <div class="orb them"></div>
  </div>
  <h1>단어 텔레파시</h1>
  <p class="tagline">모르는 사람과 마음이 통할 때까지</p>

  <!-- ========== 홈 ========== -->
  <section class="screen active" id="screen-home">
    <div class="rules">
      <b class="me">나</b>와 <b class="them">상대</b>가 8초 안에 단어를 하나씩 적어요.<br />
      서로의 단어를 보고, 두 단어에서 연상되는 것을 떠올려요.<br />
      <b class="sync">같은 단어</b>를 적는 순간, 게임 끝!<br />
      단, <b class="me">이전에 나온 단어</b>는 다시 사용할 수 없어요.
    </div>
    <div class="home-actions">
      <input type="text" id="nickname" placeholder="닉네임 (최대 12자)" maxlength="12" autocomplete="off" />
      <button id="btn-random">랜덤 매칭</button>
      <button id="btn-create" class="accent">방 만들기 (친구랑 하기)</button>
      <div class="join-row">
        <input type="text" id="join-code" placeholder="초대 코드" maxlength="4" autocomplete="off" />
        <button id="btn-join">참가</button>
      </div>
    </div>
    <p class="home-error" id="home-error"></p>

    <div class="recent">
      <h2>최근 게임</h2>
      <div id="recent-list"></div>
    </div>
  </section>

  <!-- ========== 게임 기보 ========== -->
  <section class="screen" id="screen-kifu">
    <button class="ghost" id="btn-kifu-back">← 메인으로</button>
    <h2 class="kifu-title" id="kifu-title"></h2>
    <p class="kifu-sub" id="kifu-sub"></p>
    <div class="kifu-list" id="kifu-list"></div>
  </section>

  <!-- ========== 랜덤 매칭 대기 ========== -->
  <section class="screen" id="screen-wait">
    <div class="dots"><span></span><span></span><span></span></div>
    <p>상대를 찾는 중이에요</p>
    <button class="ghost" id="btn-cancel-wait">취소하고 메인으로</button>
  </section>

  <!-- ========== 방 대기 (초대 코드) ========== -->
  <section class="screen" id="screen-room">
    <p class="room-hint">친구에게 이 코드를 알려주세요</p>
    <div class="room-code" id="room-code">····</div>
    <p class="room-hint">친구가 참가하면 게임이 바로 시작돼요</p>
    <div class="dots"><span></span><span></span><span></span></div>
    <button class="ghost" id="btn-cancel-room">취소하고 메인으로</button>
  </section>

  <!-- ========== 게임 ========== -->
  <section class="screen" id="screen-game">
    <div class="game-head">
      <span class="round-label" id="round-label">ROUND 1</span>
      <div class="head-right">
        <span class="vs-label"><b class="me" id="my-name">나</b> · <b class="them" id="opp-name">상대</b></span>
        <button class="leave-btn" id="btn-giveup">포기 제안</button>
        <button class="leave-btn" id="btn-leave">나가기</button>
      </div>
    </div>
    <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
    <p class="phase-msg" id="phase-msg"></p>

    <div class="giveup-prompt" id="giveup-prompt">
      <p>상대가 게임을 그만하고 싶어해요.</p>
      <div class="giveup-prompt-actions">
        <button class="accent" id="btn-giveup-agree">동의하고 종료</button>
        <button class="ghost" id="btn-giveup-decline">거절하고 계속</button>
      </div>
    </div>

    <div class="history" id="history"></div>

    <form class="word-form" id="word-form">
      <input type="text" id="word-input" placeholder="단어를 입력하세요" maxlength="20" autocomplete="off" />
      <button type="submit" id="word-btn">보내기</button>
    </form>

    <div class="reveal-area" id="reveal-area">
      <div class="word-card mine"><span class="who">나</span><span id="reveal-mine"></span></div>
      <div class="word-card theirs"><span class="who">상대</span><span id="reveal-theirs"></span></div>
    </div>
  </section>

  <!-- ========== 결과 ========== -->
  <section class="screen" id="screen-result">
    <p class="result-sub" id="result-sub"></p>
    <p class="result-word" id="result-word"></p>
    <p class="result-sub" id="result-detail"></p>

    <!-- 승리 후: 한 번 더 투표 -->
    <div class="vote-box" id="vote-box">
      <button class="accent" id="btn-vote-yes">이 사람과 한 번 더</button>
      <button class="ghost" id="btn-vote-no">그만하고 메인으로</button>
      <p class="vote-status" id="vote-status"></p>
    </div>

    <!-- 게임이 완전히 끝났을 때 -->
    <div class="end-box" id="end-box">
      <button id="btn-again">새로운 상대 찾기</button>
      <button class="ghost" id="btn-home">메인으로</button>
    </div>
  </section>

  <footer class="app-footer">
    <a href="/privacy.html">개인정보처리방침</a>
  </footer>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  // ---------- 화면 요소 ----------
  const $ = (id) => document.getElementById(id);
  const screens = ['screen-home', 'screen-wait', 'screen-room', 'screen-game', 'screen-result', 'screen-kifu'];
  function showScreen(id) {
    screens.forEach((s) => $(s).classList.toggle('active', s === id));
    // 게임 기보 화면에서는 구슬 애니메이션이 내용을 가리므로 숨김
    $('orbs').style.display = (id === 'screen-kifu') ? 'none' : '';
  }

  let myNickname = '';
  let currentOpponent = '';
  let timerInterval = null;
  let currentGameRounds = [];

  // ---------- 닉네임 기억하기 ----------
  $('nickname').value = localStorage.getItem('nickname') || '';
  function getNickname() {
    myNickname = $('nickname').value.trim() || '익명';
    localStorage.setItem('nickname', myNickname);
    return myNickname;
  }

  // ---------- 최근 5게임 기록 (브라우저에 저장) ----------
  function loadRecent() {
    try { return JSON.parse(localStorage.getItem('recentGames')) || []; }
    catch { return []; }
  }
  function saveRecentGame(entry) {
    const list = loadRecent();
    list.unshift(entry);                       // 최신을 맨 앞에
    localStorage.setItem('recentGames', JSON.stringify(list.slice(0, 5))); // 5개까지만
  }
  function renderRecent() {
    const list = loadRecent();
    const box = $('recent-list');
    if (list.length === 0) {
      box.innerHTML = '<p class="recent-empty">아직 기록이 없어요. 첫 텔레파시를 시도해보세요!</p>';
      return;
    }
    box.innerHTML = '';
    list.forEach((g) => {
      const d = new Date(g.at);
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'recent-item';
      item.innerHTML =
        `<span class="word">${escapeHtml(g.word)}</span>` +
        `<span class="meta">${escapeHtml(g.opponent)}님과 · ${g.rounds}라운드 · ${d.getMonth() + 1}/${d.getDate()}</span>`;
      item.addEventListener('click', () => showKifu(g));
      box.appendChild(item);
    });
  }
  renderRecent();

  // ---------- 게임 기보 (라운드별로 오간 단어 보기) ----------
  function showKifu(record) {
    $('kifu-title').textContent = `${record.opponent}님과의 텔레파시`;
    $('kifu-sub').textContent = `${record.rounds}라운드 만에 "${record.word}"로 마음이 통했어요`;

    const list = $('kifu-list');
    list.innerHTML = '';
    if (!record.roundLog || record.roundLog.length === 0) {
      list.innerHTML = '<p class="recent-empty">이 게임은 라운드별 기록이 없어요 (업데이트 이전 게임).</p>';
    } else {
      record.roundLog.forEach((r) => {
        const row = document.createElement('div');
        row.className = 'kifu-row' + (r.matched ? ' matched' : '');
        row.innerHTML =
          `<span class="kifu-round">R${r.round}</span>
          <span class="kifu-words">
            <span class="kifu-word-tag me">${escapeHtml(r.mine)}</span>
            <span class="kifu-plus">+</span>
            <span class="kifu-word-tag them">${escapeHtml(r.theirs)}</span>
          </span>
          ${r.matched ? '<span class="kifu-badge">일치!</span>' : ''}`;
        list.appendChild(row);
      });
    }
    showScreen('screen-kifu');
  }
  $('btn-kifu-back').addEventListener('click', goHome);

  // ---------- 타이머 바 ----------
  function runTimer(totalMs) {
    clearInterval(timerInterval);
    const start = Date.now();
    const fill = $('timer-fill');
    fill.style.width = '100%';
    timerInterval = setInterval(() => {
      const remain = Math.max(0, totalMs - (Date.now() - start));
      fill.style.width = (remain / totalMs) * 100 + '%';
      if (remain <= 0) clearInterval(timerInterval);
    }, 100);
  }

  // ---------- 홈: 세 가지 시작 방법 ----------
  $('btn-random').addEventListener('click', () => {
    socket.emit('join_queue', getNickname());
  });
  $('btn-create').addEventListener('click', () => {
    socket.emit('create_room', getNickname());
  });
  $('btn-join').addEventListener('click', () => {
    const code = $('join-code').value.trim().toUpperCase();
    if (code.length !== 4) {
      $('home-error').textContent = '초대 코드 4자리를 입력해주세요.';
      return;
    }
    socket.emit('join_room', { nickname: getNickname(), code });
  });
  $('join-code').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('btn-join').click();
  });

  socket.on('waiting', () => {
    $('home-error').textContent = '';
    showScreen('screen-wait');
  });
  socket.on('room_created', ({ code }) => {
    $('home-error').textContent = '';
    $('room-code').textContent = code;
    showScreen('screen-room');
  });
  socket.on('room_error', ({ message }) => {
    $('home-error').textContent = message;
    showScreen('screen-home');
  });

  // ---------- 대기 취소 ----------
  function goHome() {
    clearInterval(timerInterval);
    $('orbs').classList.remove('synced');
    renderRecent();
    showScreen('screen-home');
  }
  $('btn-cancel-wait').addEventListener('click', () => { socket.emit('cancel_waiting'); goHome(); });
  $('btn-cancel-room').addEventListener('click', () => { socket.emit('cancel_waiting'); goHome(); });

  // ---------- 매칭 완료 ----------
  socket.on('matched', ({ opponent }) => {
    currentOpponent = opponent;
    startNewBoard(`${opponent}님과 연결됐어요. 곧 시작합니다!`);
  });

  // 게임판 초기화 (첫 게임 + "한 번 더" 재시작에서 공통 사용)
  function startNewBoard(message) {
    currentGameRounds = [];
    $('my-name').textContent = myNickname;
    $('opp-name').textContent = currentOpponent;
    $('history').innerHTML = '';
    $('orbs').classList.remove('synced');
    $('word-form').style.display = 'none';
    $('reveal-area').classList.remove('show');
    $('phase-msg').textContent = message;
    $('timer-fill').style.width = '100%';
    $('giveup-prompt').classList.remove('show');
    $('btn-giveup').disabled = false;
    $('btn-giveup').textContent = '포기 제안';
    showScreen('screen-game');
  }

  // ---------- 라운드 시작: 단어 입력 ----------
  socket.on('round_start', ({ round, time }) => {
    $('round-label').textContent = 'ROUND ' + round;
    $('phase-msg').textContent = round === 1
      ? '떠오르는 단어를 아무거나 적어보세요!'
      : '두 단어에서 연상되는 것을 적어보세요!';
    $('reveal-area').classList.remove('show');
    $('word-form').style.display = 'flex';
    $('word-input').value = '';
    $('word-input').disabled = false;
    $('word-btn').disabled = false;
    $('word-input').focus();
    runTimer(time);
  });

  // ---------- 단어 제출 ----------
  $('word-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const word = $('word-input').value.trim();
    if (!word) return;
    socket.emit('submit_word', word);
    $('word-input').disabled = true;
    $('word-btn').disabled = true;
    $('phase-msg').textContent = '제출 완료! 상대를 기다리는 중…';
  });

  socket.on('opponent_submitted', () => {
    if (!$('word-input').disabled) {
      $('phase-msg').textContent = '상대는 이미 단어를 냈어요. 서두르세요!';
    }
  });

  // ---------- 이미 나온 단어를 다시 냈을 때 ----------
  socket.on('word_rejected', ({ message }) => {
    $('word-input').disabled = false;
    $('word-btn').disabled = false;
    $('phase-msg').textContent = message;
    $('word-input').focus();
    $('word-input').select();
  });

  // ---------- 공개 단계 ----------
  socket.on('reveal', ({ mine, theirs, matched, round, time }) => {
    $('word-form').style.display = 'none';
    $('reveal-mine').textContent = mine;
    $('reveal-theirs').textContent = theirs;
    $('reveal-area').classList.add('show');

    const line = document.createElement('div');
    line.className = 'history-row';
    line.innerHTML = `R${round} — <b class="me">${escapeHtml(mine)}</b> / <b class="them">${escapeHtml(theirs)}</b>`;
    $('history').prepend(line);

    currentGameRounds.push({ round, mine, theirs, matched });

    if (matched) {
      $('orbs').classList.add('synced');
      $('phase-msg').textContent = '마음이 통했어요!';
      clearInterval(timerInterval);
      $('timer-fill').style.width = '100%';
    } else {
      $('phase-msg').textContent = '아직이에요. 다음 단어를 생각해보세요.';
      runTimer(time);
    }
  });

  // ---------- 게임 종료 → 결과 + 투표 ----------
  socket.on('game_over', ({ rounds, word, gamesTogether }) => {
    saveRecentGame({ word, rounds, opponent: currentOpponent, at: Date.now(), roundLog: currentGameRounds });
    setTimeout(() => {
      $('result-sub').textContent = '두 사람이 도착한 단어';
      $('result-word').textContent = word;
      $('result-detail').textContent =
        `${rounds}라운드 만에 마음이 통했어요` +
        (gamesTogether > 1 ? ` (${currentOpponent}님과 ${gamesTogether}번째 성공!)` : '');
      // 투표 상자 보이기
      $('vote-box').classList.add('show');
      $('end-box').classList.remove('show');
      $('vote-status').textContent = '';
      $('btn-vote-yes').disabled = false;
      showScreen('screen-result');
    }, 1800); // 동기화 연출을 잠시 보여준 뒤 이동
  });

  // ---------- "한 번 더" 투표 ----------
  $('btn-vote-yes').addEventListener('click', () => {
    socket.emit('vote_continue', true);
    $('btn-vote-yes').disabled = true;
    $('vote-status').textContent = '상대의 응답을 기다리는 중…';
  });
  $('btn-vote-no').addEventListener('click', () => {
    socket.emit('vote_continue', false);
    goHome();
  });

  socket.on('opponent_voted', ({ agree }) => {
    if (agree) $('vote-status').textContent = '상대가 한 번 더 하고 싶어해요!';
  });

  socket.on('vote_result', ({ continue: cont, gamesTogether, reason }) => {
    if (cont) {
      // 같은 파트너와 새 게임 시작
      startNewBoard(`${currentOpponent}님과 ${gamesTogether}번째 게임! 곧 시작합니다.`);
    } else {
      $('vote-box').classList.remove('show');
      $('end-box').classList.add('show');
      $('result-sub').textContent = '';
      if (reason === 'timeout') {
        $('result-word').textContent = '시간 초과';
        $('result-detail').textContent = '응답이 없어 게임이 종료됐어요.';
      } else {
        $('result-word').textContent = '여기까지!';
        $('result-detail').textContent = '상대가 게임을 마쳤어요. 즐거우셨나요?';
      }
    }
  });

  // ---------- 게임 포기 투표 ----------
  $('btn-giveup').addEventListener('click', () => {
    socket.emit('vote_giveup', true);
    $('btn-giveup').disabled = true;
    $('btn-giveup').textContent = '제안함 · 응답 대기';
  });
  $('btn-giveup-agree').addEventListener('click', () => {
    socket.emit('vote_giveup', true);
    $('giveup-prompt').classList.remove('show');
  });
  $('btn-giveup-decline').addEventListener('click', () => {
    socket.emit('vote_giveup', false);
    $('giveup-prompt').classList.remove('show');
  });
  socket.on('opponent_giveup_requested', () => {
    $('giveup-prompt').classList.add('show');
  });
  socket.on('giveup_declined', () => {
    $('btn-giveup').disabled = false;
    $('btn-giveup').textContent = '포기 제안';
    $('giveup-prompt').classList.remove('show');
    $('phase-msg').textContent = '상대가 포기 제안을 거절했어요. 계속 진행할게요!';
  });
  socket.on('game_giveup', () => {
    clearInterval(timerInterval);
    $('orbs').classList.remove('synced');
    $('result-sub').textContent = '';
    $('result-word').textContent = '게임을 그만뒀어요';
    $('result-detail').textContent = '둘 다 포기에 동의했어요. 다시 도전해볼까요?';
    $('vote-box').classList.remove('show');
    $('end-box').classList.add('show');
    showScreen('screen-result');
  });

  // ---------- 게임 중 나가기 ----------
  $('btn-leave').addEventListener('click', () => {
    if (confirm('정말 나갈까요? 지금 게임은 종료돼요.')) {
      socket.emit('leave_game');
      goHome();
    }
  });

  // ---------- 상대가 나감 ----------
  socket.on('opponent_left', () => {
    clearInterval(timerInterval);
    $('result-sub').textContent = '';
    $('result-word').textContent = '상대가 나갔어요';
    $('result-detail').textContent = '새로운 상대를 찾아볼까요?';
    $('orbs').classList.remove('synced');
    $('vote-box').classList.remove('show');
    $('end-box').classList.add('show');
    showScreen('screen-result');
  });

  // ---------- 결과 화면 버튼 ----------
  $('btn-again').addEventListener('click', () => {
    $('orbs').classList.remove('synced');
    socket.emit('join_queue', myNickname || getNickname());
  });
  $('btn-home').addEventListener('click', goHome);

  // XSS 방지용: 기록에 단어를 넣을 때 HTML 문자를 이스케이프
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
</script>
</body>
</html>
